model_type: retroprime
# Stage your downloaded checkpoints here. Two subdirs are required:
#   {model_dir}/USPTO-50K_pos_pred/USPTO-50K_pos_pred_model_step_90000.pt
#   {model_dir}/USPTO-50K_S2R/USPTO-50K_S2R_model_step_100000.pt
# Default resolves relative to the repo (REPO_ROOT) so the same config works
# locally and on puhti. Override with RETROPRIME_CHECKPOINTS env var or
# `single_step_model.model_dir=...` on the CLI.
model_dir: ${oc.env:RETROPRIME_CHECKPOINTS,${oc.env:REPO_ROOT}/checkpoints}
beam_size: 10
default_num_results: 10
use_cache: true
